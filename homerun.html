<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HR Oracle">
<meta name="theme-color" content="#050510">
<title>theDiff3r3nc3 · HR Filter</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#050510;--bg2:#08081A;--bg3:#0D0D20;--border:#1A1A35;--text:#F0F0FF;--muted:#4B5563;--dim:#1F2937;--green:#14F195;--red:#FF4D6D;--yellow:#FBBF24;--blue:#60A5FA;--orange:#F7931A;--purple:#A78BFA;--safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;overflow:hidden}
#app{display:flex;flex-direction:column;height:100dvh;overflow:hidden}
#header{flex-shrink:0;background:linear-gradient(180deg,#0A0A1E,var(--bg));border-bottom:1px solid var(--border);padding:calc(var(--safe-top) + 12px) 16px 12px}
.header-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
.logo-wrap{display:flex;align-items:center;gap:10px}
.agent-avatar{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#A78BFA,#627EEA);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;box-shadow:0 0 15px #A78BFA40;border:2px solid #A78BFA40;overflow:hidden}
.agent-avatar img{width:100%;height:100%;object-fit:cover;border-radius:8px}
.logo{font-family:'Orbitron',monospace;font-size:13px;font-weight:900;letter-spacing:.08em;background:linear-gradient(90deg,#A78BFA,#60A5FA,var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:7px;color:var(--dim);letter-spacing:.12em;margin-top:2px}
.refresh-btn{padding:8px 12px;background:linear-gradient(90deg,#A78BFA,#627EEA);border:none;border-radius:8px;color:#fff;font-size:10px;font-weight:700;letter-spacing:.08em;font-family:'Orbitron',monospace;cursor:pointer;-webkit-appearance:none;flex-shrink:0}
.refresh-btn:disabled{opacity:.5;cursor:wait}
.stats-bar{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px}
.stats-bar::-webkit-scrollbar{display:none}
.stat-pill{display:flex;flex-direction:column;align-items:center;padding:5px 9px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);flex-shrink:0;min-width:58px}
.stat-val{font-size:13px;font-weight:700;font-family:'Orbitron',monospace}
.stat-lbl{font-size:6px;color:var(--muted);letter-spacing:.08em;margin-top:2px}
#progress-wrap{height:2px;background:var(--bg2);flex-shrink:0;display:none}
#progress-bar{height:100%;width:0%;background:linear-gradient(90deg,#A78BFA,var(--green));transition:width .3s ease}
#controls{flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 12px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.ctrl-group{display:flex;flex-direction:column;gap:3px}
.ctrl-lbl{font-size:7px;color:var(--muted);letter-spacing:.08em}
.ctrl-input,.ctrl-select{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:7px 8px;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:11px;outline:none;-webkit-appearance:none}
.ctrl-input:focus,.ctrl-select:focus{border-color:var(--purple)}
.ctrl-input{width:96px}
.fav-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none;margin-left:auto}
.fav-toggle .tg{position:relative;width:40px;height:22px;background:var(--bg3);border:1px solid var(--border);border-radius:11px;transition:all .25s;flex-shrink:0}
.fav-toggle.on .tg{background:linear-gradient(90deg,#A78BFA,var(--green));border-color:transparent}
.fav-toggle .tg::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform .25s}
.fav-toggle.on .tg::after{transform:translateX(18px)}
.fav-toggle .tg-lbl{font-size:8px;color:var(--muted);letter-spacing:.08em}
#main-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 12px 0}
#status-line{font-size:9px;color:var(--blue);letter-spacing:.05em;margin-bottom:10px;min-height:12px}
.hr-card{background:linear-gradient(160deg,#0D0D1E,var(--bg2));border-radius:14px;padding:13px;margin-bottom:10px;position:relative;overflow:hidden;border:1px solid var(--border)}
.hr-card.fav{border-color:#14F19540;box-shadow:0 4px 24px #14F19510}
.hr-card.cold{box-shadow:0 4px 18px #60A5FA10}
.hc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px}
.hc-rank{font-family:'Orbitron',monospace;font-size:11px;font-weight:900;color:var(--dim);min-width:24px}
.hc-name{font-size:14px;font-weight:700;line-height:1.1}
.hc-meta{font-size:8px;color:var(--muted);margin-top:3px;letter-spacing:.04em}
.hc-due{text-align:center;flex-shrink:0}
.hc-due-val{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;line-height:1}
.hc-due-lbl{font-size:6px;color:var(--muted);letter-spacing:.1em;margin-top:2px}
.k-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:9px}
.k-box{background:var(--bg);border-radius:7px;padding:7px 4px;text-align:center}
.k-lbl{font-size:6px;color:var(--muted);letter-spacing:.06em;margin-bottom:3px}
.k-val{font-family:'Orbitron',monospace;font-size:16px;font-weight:700;line-height:1}
.k-sub{font-size:7px;color:var(--dim);margin-top:2px}
.matchup{background:var(--bg);border-radius:9px;padding:9px 10px;border:1px solid var(--border)}
.mu-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.mu-vs{font-size:9px;color:var(--muted);letter-spacing:.05em}
.mu-vs b{color:var(--text)}
.badge{font-size:7px;font-weight:700;padding:3px 7px;border-radius:20px;letter-spacing:.06em}
.mu-grid{display:flex;gap:8px;flex-wrap:wrap}
.mu-item{font-size:8px;color:var(--muted)}
.mu-item b{color:var(--text);font-family:'Orbitron',monospace}
.pb-track{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:8px}
.pb-fill{height:100%;border-radius:2px;transition:width .8s ease}
.empty{text-align:center;padding:50px 20px;color:var(--dim);font-size:11px;line-height:2}
.legend{font-size:8px;color:var(--dim);line-height:1.7;padding:6px 2px 14px;border-top:1px solid var(--border);margin-top:6px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.spin{display:inline-block;animation:spin .9s linear infinite}
.pulse{animation:pulse 1.4s infinite}
.fade-in{animation:fadeUp .35s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
#bottom-pad{flex-shrink:0;height:calc(var(--safe-bot) + 6px);background:var(--bg)}
</style>
</head>
<body>
<div id="app">
<div id="header">
  <div class="header-top">
    <div class="logo-wrap">
      <div class="agent-avatar"><img id="nft-avatar" alt="NFT" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg=="></div>
      <div><div class="logo">HOMERUN ORACLE</div><div class="logo-sub">DUE-FOR-A-BOMB · TOP 100 HITTERS</div></div>
    </div>
    <button class="refresh-btn" id="refresh-btn" onclick="load()">⟳ SCAN</button>
  </div>
  <div class="stats-bar">
    <div class="stat-pill"><div class="stat-val" id="st-players" style="color:var(--blue)">--</div><div class="stat-lbl">PLAYERS</div></div>
    <div class="stat-pill"><div class="stat-val" id="st-fav" style="color:var(--green)">--</div><div class="stat-lbl">FAVORABLE</div></div>
    <div class="stat-pill"><div class="stat-val" id="st-max" style="color:var(--orange)">--</div><div class="stat-lbl">MAX DROUGHT</div></div>
    <div class="stat-pill"><div class="stat-val" id="st-avg" style="color:var(--yellow)">--</div><div class="stat-lbl">AVG DROUGHT</div></div>
    <div class="stat-pill"><div class="stat-val" id="st-games" style="color:var(--purple)">--</div><div class="stat-lbl">GAMES TODAY</div></div>
  </div>
</div>
<div id="progress-wrap"><div id="progress-bar"></div></div>

<div id="controls">
  <div class="ctrl-group">
    <span class="ctrl-lbl">DATE</span>
    <input class="ctrl-input" type="date" id="date-input">
  </div>
  <div class="ctrl-group">
    <span class="ctrl-lbl">SEASON</span>
    <input class="ctrl-input" type="number" id="season-input" style="width:70px" min="2000" max="2030">
  </div>
  <div class="ctrl-group">
    <span class="ctrl-lbl">SORT BY</span>
    <select class="ctrl-select" id="sort-select" onchange="render()">
      <option value="drought">Longest Drought</option>
      <option value="due">Combined Due Score</option>
      <option value="matchup">Best Matchup</option>
    </select>
  </div>
  <div class="fav-toggle" id="fav-toggle" onclick="toggleFav()">
    <span class="tg-lbl">FAVORABLE ONLY</span>
    <div class="tg"></div>
  </div>
</div>

<div id="main-content">
  <div id="status-line"></div>
  <div id="list"></div>
  <div class="legend" id="legend"></div>
</div>
<div id="bottom-pad"></div>
</div>

<script>
const API="https://statsapi.mlb.com/api/v1";

// ─── BALLPARK HR FACTORS (100 = neutral; >100 favors home runs) ────────────────
const PARK={
  "Coors Field":112,"Great American Ball Park":113,"Yankee Stadium":110,"Citizens Bank Park":108,
  "Globe Life Field":104,"Oriole Park at Camden Yards":101,"Fenway Park":99,"Dodger Stadium":103,
  "Wrigley Field":101,"Truist Park":102,"Chase Field":103,"Daikin Park":101,"Minute Maid Park":101,
  "Rogers Centre":103,"American Family Field":105,"Nationals Park":101,"Citi Field":96,"Petco Park":96,
  "Oracle Park":90,"T-Mobile Park":93,"loanDepot park":95,"Comerica Park":94,"Kauffman Stadium":95,
  "Angel Stadium":102,"Busch Stadium":96,"PNC Park":94,"Target Field":99,"Progressive Field":98,
  "Rate Field":103,"Guaranteed Rate Field":103,"Sutter Health Park":100,"George M. Steinbrenner Field":102
};
function parkFactor(name){
  if(!name)return 100;
  if(PARK[name]!=null)return PARK[name];
  const k=Object.keys(PARK).find(k=>name.includes(k)||k.includes(name));
  return k?PARK[k]:100;
}

const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

// ─── STATE ─────────────────────────────────────────────────────────────────────
let state={players:[],favOnly:false,loading:false};

// ─── FETCH HELPER ──────────────────────────────────────────────────────────────
async function getJSON(url){
  const r=await fetch(url);
  if(!r.ok)throw new Error(`${r.status} ${url}`);
  return r.json();
}

// Bounded-concurrency map so we don't fire 100+ requests at once
async function pool(items,fn,size=6,onTick){
  const out=new Array(items.length);let idx=0,done=0;
  const worker=async()=>{
    while(idx<items.length){
      const i=idx++;
      try{out[i]=await fn(items[i],i);}catch(e){out[i]=null;}
      done++;if(onTick)onTick(done,items.length);
    }
  };
  await Promise.all(Array.from({length:Math.min(size,items.length)},worker));
  return out;
}

// ─── DATA ──────────────────────────────────────────────────────────────────────
async function getSchedule(date){
  const d=await getJSON(`${API}/schedule?sportId=1&date=${date}&hydrate=probablePitcher,team,venue`);
  const games=d?.dates?.[0]?.games||[];
  const byTeam={};
  games.forEach(g=>{
    const venue=g.venue?.name;
    const home=g.teams.home,away=g.teams.away;
    byTeam[home.team.id]={opp:away.team,isHome:true,venue,oppPitcher:away.probablePitcher,time:g.gameDate,status:g.status?.detailedState};
    byTeam[away.team.id]={opp:home.team,isHome:false,venue,oppPitcher:home.probablePitcher,time:g.gameDate,status:g.status?.detailedState};
  });
  return {byTeam,count:games.length};
}

async function getTopHitters(season,limit){
  const d=await getJSON(`${API}/stats?stats=season&group=hitting&season=${season}&sportId=1&limit=${limit}&sortStat=homeRuns&gameType=R&playerPool=All`);
  const splits=d?.stats?.[0]?.splits||[];
  return splits.map(s=>({
    id:s.player.id,name:s.player.fullName,
    teamId:s.team?.id,teamName:s.team?.name,
    pos:s.position?.abbreviation,
    hr:+s.stat.homeRuns||0,games:+s.stat.gamesPlayed||0,
    avg:s.stat.avg,ops:s.stat.ops
  })).sort((a,b)=>b.hr-a.hr);
}

async function getDrought(playerId,season){
  const d=await getJSON(`${API}/people/${playerId}/stats?stats=gameLog&group=hitting&season=${season}&gameType=R`);
  const splits=(d?.stats?.[0]?.splits||[]).filter(s=>s.stat&&s.date);
  let drought=0,lastHR=null;
  for(let i=splits.length-1;i>=0;i--){
    if((+splits[i].stat.homeRuns||0)>0){lastHR=splits[i].date;break;}
    drought++;
  }
  return {drought,lastHR,gamesLogged:splits.length};
}

async function getPitcher(pid,season){
  const d=await getJSON(`${API}/people/${pid}/stats?stats=season&group=pitching&season=${season}&gameType=R`);
  const st=d?.stats?.[0]?.splits?.[0]?.stat;
  if(!st)return null;
  return {hr9:st.homeRunsPer9!=null?+st.homeRunsPer9:null,hr:+st.homeRuns||0,ip:st.inningsPitched,era:st.era};
}

async function getPeople(ids){
  if(!ids.length)return {};
  const d=await getJSON(`${API}/people?personIds=${ids.join(",")}`);
  const map={};
  (d.people||[]).forEach(p=>{map[p.id]={bat:p.batSide?.code,pitch:p.pitchHand?.code,name:p.fullName};});
  return map;
}

// ─── SCORING ───────────────────────────────────────────────────────────────────
function platoon(bat,pitch){
  if(!bat||!pitch)return null;
  if(bat==="S")return "adv";
  return bat!==pitch?"adv":"dis"; // hitter favored vs opposite-handed pitcher
}
function droughtScore(d){return clamp(Math.round(d*5),0,100);} // ~20 games => maxed out
function matchupScore(hr9,park,plt){
  const pComp=hr9==null?50:clamp((hr9-0.8)/(2.4-0.8)*100,0,100);
  const parkComp=clamp((park-88)/(114-88)*100,0,100);
  let s=pComp*0.6+parkComp*0.4;
  if(plt==="adv")s+=6;else if(plt==="dis")s-=6;
  return clamp(Math.round(s),0,100);
}
function dueScore(d,m){return Math.round(droughtScore(d)*0.55+m*0.45);}

// ─── MAIN LOAD ─────────────────────────────────────────────────────────────────
function setProgress(n){
  const w=document.getElementById("progress-wrap"),b=document.getElementById("progress-bar");
  if(n>0&&n<100){w.style.display="block";b.style.width=n+"%";}else{w.style.display="none";b.style.width="0%";}
}
function status(msg,color="var(--blue)"){
  const el=document.getElementById("status-line");el.style.color=color;el.innerHTML=msg;
}

async function load(){
  if(state.loading)return;
  state.loading=true;
  const btn=document.getElementById("refresh-btn");btn.disabled=true;
  const season=+document.getElementById("season-input").value;
  const date=document.getElementById("date-input").value;
  try{
    status('<span class="spin">⟳</span> Fetching today’s schedule…');setProgress(8);
    const {byTeam,count}=await getSchedule(date);
    document.getElementById("st-games").textContent=count;
    if(count===0){
      state.players=[];render();
      status(`No MLB games scheduled on ${date}. Try another date.`,"var(--yellow)");
      return;
    }

    status('<span class="spin">⟳</span> Fetching top-100 HR hitters…');setProgress(18);
    const hitters=await getTopHitters(season,100);
    if(!hitters.length){
      state.players=[];render();
      status(`No hitting data for ${season}. Try a season with played games.`,"var(--yellow)");
      return;
    }

    // Only hitters whose team plays on the selected date are actionable (need a matchup)
    let actionable=hitters.filter(h=>byTeam[h.teamId]).map(h=>({...h,game:byTeam[h.teamId]}));

    // Batch-fetch handedness for hitters + the (deduped) opposing probable pitchers
    const pitcherIds=[...new Set(actionable.map(h=>h.game.oppPitcher?.id).filter(Boolean))];
    status('<span class="spin">⟳</span> Loading handedness & pitcher profiles…');setProgress(28);
    const allIds=[...new Set([...actionable.map(h=>h.id),...pitcherIds])];
    // people endpoint handles many ids; chunk to be safe
    const peopleMap={};
    for(let i=0;i<allIds.length;i+=40){
      Object.assign(peopleMap,await getPeople(allIds.slice(i,i+40)));
    }

    // Pitcher season stats (deduped)
    const pitcherStats={};
    await pool(pitcherIds,async pid=>{pitcherStats[pid]=await getPitcher(pid,season);},6);

    // Per-hitter game logs for HR drought (the expensive part)
    status('<span class="spin">⟳</span> Computing HR droughts for '+actionable.length+' hitters…');
    const logs=await pool(actionable,h=>getDrought(h.id,season),6,(done,total)=>{
      setProgress(30+Math.round(done/total*65));
      status('<span class="spin">⟳</span> Computing HR droughts… '+done+'/'+total);
    });

    // Assemble
    state.players=actionable.map((h,i)=>{
      const log=logs[i]||{drought:0,lastHR:null,gamesLogged:0};
      const g=h.game;
      const pitcher=g.oppPitcher;
      const pst=pitcher?pitcherStats[pitcher.id]:null;
      const bat=peopleMap[h.id]?.bat;
      const pitchHand=pitcher?peopleMap[pitcher.id]?.pitch:null;
      const plt=platoon(bat,pitchHand);
      const park=parkFactor(g.venue);
      const mScore=matchupScore(pst?.hr9,park,plt);
      return {
        ...h,bat,
        drought:log.drought,lastHR:log.lastHR,gamesLogged:log.gamesLogged,
        opp:g.opp,isHome:g.isHome,venue:g.venue,park,
        pitcher:pitcher?{id:pitcher.id,name:pitcher.fullName,hand:pitchHand,...pst}:null,
        platoon:plt,
        mScore,dScore:droughtScore(log.drought),due:dueScore(log.drought,mScore),
        favorable:mScore>=55
      };
    });

    setProgress(100);setTimeout(()=>setProgress(0),300);
    render();
    const fav=state.players.filter(p=>p.favorable).length;
    status(`✓ Scanned ${state.players.length} hitters across ${count} games · ${fav} favorable matchups`,"var(--green)");
  }catch(e){
    status(`✗ ${e.message}. The MLB Stats API may be blocked by your network/CORS, or the date/season has no data.`,"var(--red)");
    setProgress(0);
  }finally{
    state.loading=false;btn.disabled=false;
  }
}

// ─── RENDER ────────────────────────────────────────────────────────────────────
function toggleFav(){
  state.favOnly=!state.favOnly;
  document.getElementById("fav-toggle").classList.toggle("on",state.favOnly);
  render();
}

function fmtDate(d){
  if(!d)return "—";
  try{return new Date(d+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"});}catch(e){return d;}
}

function render(){
  const list=document.getElementById("list");
  let players=[...state.players];
  if(state.favOnly)players=players.filter(p=>p.favorable);

  const sort=document.getElementById("sort-select").value;
  players.sort((a,b)=>{
    if(sort==="matchup")return b.mScore-a.mScore||b.drought-a.drought;
    if(sort==="due")return b.due-a.due||b.drought-a.drought;
    return b.drought-a.drought||b.mScore-a.mScore; // default: longest drought
  });

  // top stats
  if(state.players.length){
    const droughts=state.players.map(p=>p.drought);
    document.getElementById("st-players").textContent=state.players.length;
    document.getElementById("st-fav").textContent=state.players.filter(p=>p.favorable).length;
    document.getElementById("st-max").textContent=Math.max(...droughts);
    document.getElementById("st-avg").textContent=Math.round(droughts.reduce((s,v)=>s+v,0)/droughts.length);
  }

  if(!players.length){
    list.innerHTML=`<div class="empty">⚾ No hitters to show.<br>Hit <b>⟳ SCAN</b> to pull today’s slate,<br>or turn off <b>FAVORABLE ONLY</b>.</div>`;
    document.getElementById("legend").innerHTML="";
    return;
  }

  list.innerHTML=players.map((p,i)=>{
    const dueColor=p.due>=70?"var(--green)":p.due>=50?"var(--yellow)":"var(--muted)";
    const favBadge=p.favorable
      ?`<span class="badge" style="background:#14F19520;color:var(--green)">✓ FAVORABLE</span>`
      :`<span class="badge" style="background:#37415130;color:var(--muted)">NEUTRAL</span>`;
    const pitcher=p.pitcher;
    const hr9=pitcher&&pitcher.hr9!=null?pitcher.hr9.toFixed(2):"—";
    const hr9Color=pitcher&&pitcher.hr9!=null?(pitcher.hr9>=1.4?"var(--green)":pitcher.hr9<=1.0?"var(--red)":"var(--yellow)"):"var(--dim)";
    const parkColor=p.park>=104?"var(--green)":p.park<=96?"var(--red)":"var(--yellow)";
    const pltTxt=p.platoon==="adv"?'<span style="color:var(--green)">PLATOON ▲</span>':p.platoon==="dis"?'<span style="color:var(--red)">PLATOON ▼</span>':'';
    return `<div class="hr-card fade-in ${p.favorable?'fav':'cold'}">
      <div class="hc-top">
        <div style="display:flex;gap:8px;align-items:flex-start;min-width:0">
          <div class="hc-rank">${i+1}</div>
          <div style="min-width:0">
            <div class="hc-name">${p.name}</div>
            <div class="hc-meta">${p.teamName||""} · ${p.pos||"--"} · Bats ${p.bat||"?"} · ${p.hr} HR (${season()}’)</div>
          </div>
        </div>
        <div class="hc-due">
          <div class="hc-due-val" style="color:${dueColor}">${p.due}</div>
          <div class="hc-due-lbl">DUE SCORE</div>
        </div>
      </div>

      <div class="k-row">
        <div class="k-box" style="border:1px solid var(--orange)20">
          <div class="k-lbl">HR DROUGHT</div>
          <div class="k-val" style="color:var(--orange)">${p.drought}</div>
          <div class="k-sub">games</div>
        </div>
        <div class="k-box">
          <div class="k-lbl">LAST HR</div>
          <div class="k-val" style="font-size:12px;color:var(--text)">${fmtDate(p.lastHR)}</div>
          <div class="k-sub">${p.lastHR?"":"none "+season()+"’"}</div>
        </div>
        <div class="k-box">
          <div class="k-lbl">MATCHUP</div>
          <div class="k-val" style="color:${p.mScore>=55?'var(--green)':'var(--yellow)'}">${p.mScore}</div>
          <div class="k-sub">/100</div>
        </div>
      </div>

      <div class="matchup">
        <div class="mu-head">
          <div class="mu-vs">${p.isHome?"vs":"@"} <b>${p.opp?.name||"TBD"}</b> · ${p.venue||"TBD"}</div>
          ${favBadge}
        </div>
        <div class="mu-grid">
          <div class="mu-item">SP: <b>${pitcher?pitcher.name:"TBD"}</b>${pitcher&&pitcher.hand?" ("+pitcher.hand+"HP)":""}</div>
          <div class="mu-item">HR/9: <b style="color:${hr9Color}">${hr9}</b></div>
          <div class="mu-item">Park: <b style="color:${parkColor}">${p.park}</b></div>
          ${pitcher&&pitcher.era!=null?`<div class="mu-item">ERA: <b>${(+pitcher.era).toFixed(2)}</b></div>`:""}
          ${pltTxt?`<div class="mu-item">${pltTxt}</div>`:""}
        </div>
        <div class="pb-track"><div class="pb-fill" style="width:${p.due}%;background:${dueColor}"></div></div>
      </div>
    </div>`;
  }).join("");

  document.getElementById("legend").innerHTML=`
    <b>HR DROUGHT</b> — consecutive games played without a home run this season.<br>
    <b>MATCHUP</b> — opposing SP home-run rate (HR/9, 60%), ballpark HR factor (40%), ±platoon edge. Favorable ≥ 55.<br>
    <b>DUE SCORE</b> — 55% drought + 45% matchup. Higher = more likely to go yard tonight.<br>
    Data: MLB Stats API (statsapi.mlb.com). ⚠ Informational only · not betting advice.`;
}

function season(){return document.getElementById("season-input").value;}

// ─── INIT ──────────────────────────────────────────────────────────────────────
(function init(){
  const now=new Date();
  document.getElementById("date-input").value=now.toISOString().slice(0,10);
  document.getElementById("season-input").value=now.getFullYear();
  document.getElementById("nft-avatar").src="https://raw.githubusercontent.com/thedifference7717-sys/oracle/main/OCM%20Katoshi%20Classic%20%236606.png";
  status("Ready. Hit ⟳ SCAN to pull today’s slate and rank the top-100 hitters by HR drought.","var(--muted)");
})();
</script>
</body>
</html>
