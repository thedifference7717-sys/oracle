<style>
:root{--bg:#050510;--bg2:#08081A;--bg3:#0D0D20;--border:#1A1A35;--text:#F0F0FF;--muted:#B4BCC8;--dim:#8C95A4;--green:#14F195;--red:#FF4D6D;--yellow:#FBBF24;--blue:#60A5FA;--orange:#F7931A;--purple:#A78BFA}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;min-height:100%}
body{padding-bottom:calc(env(safe-area-inset-bottom,0px) + 40px)}
#topbar{position:sticky;top:0;z-index:30;background:linear-gradient(180deg,#1A0A0A,#070714);border-bottom:1px solid var(--border);padding:calc(env(safe-area-inset-top,0px) + 14px) 18px 14px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.logo{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;letter-spacing:.05em;color:#FFE9D6;text-shadow:0 0 14px #F7931A88}
.logo-sub{font-size:11px;color:var(--muted);letter-spacing:.12em;margin-top:3px}
.controls{display:flex;align-items:flex-end;gap:9px;flex-wrap:wrap;margin-left:auto}
.navlink{align-self:flex-end;padding:11px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;font-weight:700;font-family:'Orbitron',monospace;text-decoration:none}
.run-btn{padding:11px 18px;background:linear-gradient(90deg,#F7931A,#FF4D6D);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:700;letter-spacing:.06em;font-family:'Orbitron',monospace;cursor:pointer}
.run-btn:disabled{opacity:.5;cursor:wait}
#progress-wrap{height:3px;background:var(--bg2);display:none}#progress-bar{height:100%;width:0%;background:linear-gradient(90deg,#F7931A,var(--green));transition:width .2s}
#status{font-size:13px;color:var(--blue);padding:11px 18px;min-height:18px;border-bottom:1px solid var(--border);background:var(--bg2)}
.section-h{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;letter-spacing:.06em;color:var(--orange);padding:16px 18px 8px}
.parlay{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px;padding:0 18px}
@media(max-width:820px){.parlay{grid-template-columns:1fr}}
.pcard{background:linear-gradient(160deg,#1A120A,var(--bg2));border:1px solid #F7931A55;border-radius:16px;padding:15px;box-shadow:0 4px 24px #F7931A14}
.pcard.win{background:linear-gradient(160deg,#0B3B22,#0A2416);border-color:#14F195AA;box-shadow:0 4px 24px #14F19533}
.pcard.loss{background:linear-gradient(160deg,#3B0B18,#240A10);border-color:#FF4D6DAA;box-shadow:0 4px 24px #FF4D6D33}
tr.win td{background:#14F19514}tr.loss td{background:#FF4D6D14}
.chip.lose{background:#FF4D6D22;color:var(--red)}
.pc-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.pc-rank{font-family:'Orbitron',monospace;font-size:26px;font-weight:900;color:var(--orange);width:30px}
.pc-name{font-size:17px;font-weight:700;line-height:1.1}
.pc-team{font-size:10px;color:var(--muted);margin-top:2px}
.pc-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:10px}
.pc-box{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 4px;text-align:center}
.pc-v{font-family:'Orbitron',monospace;font-size:16px;font-weight:700}
.pc-l{font-size:8px;color:var(--muted);margin-top:3px;letter-spacing:.05em}
.chip{font-size:11px;font-weight:700;padding:4px 9px;border-radius:20px;flex-shrink:0}.chip.ok{background:#14F19522;color:var(--green)}.chip.pend{background:#8C95A422;color:var(--muted)}.chip.miss{background:#FBBF2422;color:var(--yellow)}
.pc-mu{font-size:12px;color:var(--text)}.pc-mu .d{color:var(--muted);font-size:11px}
.wrap{padding:14px 18px}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.panel-head{padding:12px 15px;border-bottom:1px solid var(--border);font-family:'Orbitron',monospace;font-size:12px;color:var(--purple);letter-spacing:.05em}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:14px;min-width:720px}
thead th{position:sticky;top:0;background:#0A0A1C;text-align:left;padding:11px 12px;font-size:11px;color:var(--muted);font-weight:400;border-bottom:1px solid var(--border);white-space:nowrap}
thead th.num{text-align:right}
tbody td{padding:11px 12px;white-space:nowrap;border-bottom:1px solid var(--border)}
td.num{text-align:right;font-family:'Orbitron',monospace}
.pname{font-weight:700;font-size:14px}.pteam{font-size:10px;color:var(--muted)}
.legend{font-size:12px;color:var(--muted);line-height:1.8;padding:10px 18px 0}
.spin{display:inline-block;animation:spin .9s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
.empty{padding:40px 18px;text-align:center;color:var(--dim);font-size:12px}
.rrbar{margin:0 18px 12px;padding:12px 15px;background:linear-gradient(160deg,#141024,var(--bg2));border:1px solid #A78BFA55;border-radius:14px;font-size:13px;line-height:1.9}
.rrbar b.st{font-family:'Orbitron',monospace;color:var(--green);font-size:16px}
.rrbar .pill{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;margin-right:6px}
.rrbar .pw{background:#14F19522;color:var(--green)}.rrbar .pl{background:#FF4D6D22;color:var(--red)}.rrbar .po{background:#8C95A422;color:var(--muted)}
</style>
</head>
<body>
<div id="topbar">
  <div><div class="logo">🔥 ParlAIy</div><div class="logo-sub">LAST 14 DAYS · BUILD 24 · ALWAYS 7</div></div>
  <div class="controls">
    <a class="navlink" href="hr.html">⚾ HR</a>
    <a class="navlink" href="cobb.html">🏏 2B</a>
    <a class="navlink" href="hits.html">🎯 AIchiro</a>
    <button class="run-btn" id="run" onclick="load()">⟳ REFRESH</button>
  </div>
</div>
<div id="progress-wrap"><div id="progress-bar"></div></div>
<div id="status"></div>

<div class="section-h">🔥 TOP 7 ROUND ROBIN — 1 player per game · 21 doubles · 💣 = cleared 2.5 H/R/RBI · 💀 = game over, missed</div>
<div id="rr"></div>
<div class="parlay" id="parlay"></div>

<div class="wrap">
  <div class="panel">
    <div class="panel-head">⚾ HOT HITTERS PLAYING TODAY</div>
    <div class="table-wrap"><table><thead><tr id="thead"></tr></thead><tbody id="tbody"></tbody></table></div>
  </div>
</div>
<div class="legend" id="legend"></div>

<script src="store-id.js"></script>
<script>
const API="https://statsapi.mlb.com/api/v1";
const SOURCES=[u=>u,u=>"https://corsproxy.io/?url="+encodeURIComponent(u),u=>"https://api.allorigins.win/raw?url="+encodeURIComponent(u),u=>"https://thingproxy.freeboard.io/fetch/"+u];
let good=null;let current=[];
// ── ROUND ROBIN LEDGER ──────────────────────────────────────────────────────
// Top 7 picks → all C(7,2)=21 two-leg doubles. $1 per double to start; a
// profitable day resets the stake to $1, a losing day bumps it 17%
// (compounding). Leg price is user-set american odds (default -110), frozen
// per day at entry. DNP legs are voids: the double pays as a single.
const RR_N=7,RR_BUMP=1.17,RR_LINE=3,RR_DEF_ODDS=130; // Over 2.5 H+R+RBI → needs 3+; default +130, editable
// (+130 legs: 4-of-7 comfortably positive; 3-of-7 slightly down)
let _rr=null;
function amToDec(a){return a<0?1+100/(-a):1+a/100;}
function rrLoad(){try{const r=JSON.parse(localStorage.getItem("parlaiy-rr")||"null");if(r&&r.days)return r;}catch(e){}return {stake:1,odds:RR_DEF_ODDS,days:[]};}
function rrSave(){try{localStorage.setItem("parlaiy-rr",JSON.stringify(_rr));}catch(e){}}
function rrPairPnl(a,b,stake,dec){ // leg states: "win" | "loss" | "void"
  if(a==="loss"||b==="loss")return -stake;
  if(a==="win"&&b==="win")return stake*(dec*dec-1);
  if(a==="void"&&b==="void")return 0;                 // push
  return stake*(dec-1);                               // win + void → pays as single
}
function rrSetOdds(v){const n=parseInt(v,10);
  if(!isFinite(n)||(n>-100&&n<100))return;            // american odds are ≤ -100 or ≥ +100
  _rr.odds=n;const t=_rr.days.find(x=>x.date===slateYmd());
  if(t&&!t.settled)t.odds=n;
  rrSave();sharePush();rrBanner();}
async function rrSettle(today){ // settle any past unsettled day from final stats
  for(const d of _rr.days){
    if(d.settled||d.date>=today||!d.ids||!d.ids.length)continue;
    try{
      const j=await getJSON(`${API}/stats?stats=byDateRange&group=hitting&startDate=${d.date}&endDate=${d.date}&sportId=1&limit=2000&gameType=R&playerPool=All`);
      const mm={};(j?.stats?.[0]?.splits||[]).forEach(x=>{if(x.player?.id!=null)mm[x.player.id]=(+x.stat?.hits||0)+(+x.stat?.runs||0)+(+x.stat?.rbi||0);});
      const legs=d.ids.map(id=>mm[id]==null?"void":(mm[id]>=(d.line||2)?"win":"loss")); // legacy 1.5-line days settle at 2
      const dec=amToDec(d.odds||RR_DEF_ODDS);
      let pnl=0;for(let i=0;i<legs.length;i++)for(let k=i+1;k<legs.length;k++)pnl+=rrPairPnl(legs[i],legs[k],d.stake,dec);
      d.pnl=Math.round(pnl*100)/100;d.legs=legs;d.settled=true;
      _rr.stake=d.pnl>0?1:Math.round(_rr.stake*RR_BUMP*100)/100;
    }catch(e){}
  }
  _rr.days=_rr.days.slice(-30);rrSave();
}
function rrToday(today,picks){ // create/refresh today's entry (pre-lock only changes)
  // One-time migration to the 2.5 line: odds saved under the old 1.5 line
  // don't apply, so reset to the new default (still editable).
  if(_rr.lineV!==RR_LINE){_rr.lineV=RR_LINE;_rr.odds=RR_DEF_ODDS;}
  let d=_rr.days.find(x=>x.date===today);
  const ids=picks.map(p=>p.id);
  if(!d){d={date:today,ids,stake:_rr.stake,odds:_rr.odds||RR_DEF_ODDS,line:RR_LINE,settled:false};_rr.days.push(d);}
  else if(!d.settled){d.ids=ids;d.stake=_rr.stake;d.odds=_rr.odds||RR_DEF_ODDS;d.line=RR_LINE;}
  rrSave();return d;
}
function rrBanner(){
  const el=document.getElementById("rr");if(!el)return;
  if(!_rr){el.innerHTML="";return;}
  const today=slateYmd();const d=_rr.days.find(x=>x.date===today);
  if(!d||!d.ids||!d.ids.length){el.innerHTML="";return;}
  const byId={};current.forEach(p=>{byId[p.id]=p;});
  const legs=d.ids.map(id=>{const p=byId[id];if(!p)return "pend";
    if(p.cleared)return "win";
    if(p.final)return p.todayHRR==null?"void":"loss";
    return "pend";});
  if(document.activeElement&&document.activeElement.id==="rr-odds")return; // don't clobber mid-edit
  const dec=amToDec(d.odds||RR_DEF_ODDS);
  let won=0,lost=0,open=0,pnl=0;
  for(let i=0;i<legs.length;i++)for(let k=i+1;k<legs.length;k++){
    const a=legs[i],b=legs[k];
    if(a==="pend"||b==="pend"){open++;continue;}
    const v=rrPairPnl(a,b,d.stake,dec);pnl+=v;
    if(v>=0)won++;else lost++;
  }
  const combos=d.ids.length*(d.ids.length-1)/2;
  const prev=[..._rr.days].reverse().find(x=>x.settled);
  const prevTxt=prev?`Yesterday (${prev.date.slice(5)}): <b style="color:${prev.pnl>0?'var(--green)':'var(--red)'}">${prev.pnl>0?"+":""}$${prev.pnl.toFixed(2)}</b> → stake ${prev.pnl>0?"reset to $1":"bumped 17%"}`:`First day — no history yet`;
  el.innerHTML=`<div class="rrbar">
    🎰 <b class="st">$${d.stake.toFixed(2)}</b> per double · ${combos} doubles · total outlay <b>$${(combos*d.stake).toFixed(2)}</b>
    &nbsp;·&nbsp; <span class="pill pw">WON ${won}</span><span class="pill pl">LOST ${lost}</span><span class="pill po">OPEN ${open}</span>
    settled P/L <b style="color:${pnl>=0?'var(--green)':'var(--red)'}">${pnl>=0?"+":""}$${pnl.toFixed(2)}</b>
    &nbsp;·&nbsp; LEG ODDS <input id="rr-odds" value="${d.odds||RR_DEF_ODDS}" onchange="rrSetOdds(this.value)" style="width:58px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:inherit;font-size:12px;padding:3px 6px;text-align:center">
    <div style="color:var(--muted);font-size:11px">${prevTxt} · set LEG ODDS to your book's Over 2.5 H+R+RBI price (default +130) · DNP = void (double pays as single)</div>
  </div>`;
}
// ── SHARED STORE (all devices see the same list + stake) ────────────────────
async function shareGet(){if(!window.SHARED_STORE)return null;try{const r=await fetch(window.SHARED_STORE,{headers:{Accept:"application/json"}});if(!r.ok)return null;return (await r.json())?.parlaiy||null;}catch(e){return null;}}
async function sharePush(){if(!window.SHARED_STORE)return;try{
  const r=await fetch(window.SHARED_STORE,{headers:{Accept:"application/json"}});
  const b=(r.ok?await r.json():null)||{};
  let snap=null;try{snap=JSON.parse(localStorage.getItem("parlaiy-snap")||"null");}catch(e){}
  b.parlaiy={snap,rr:_rr,updated:new Date().toISOString()};
  await fetch(window.SHARED_STORE,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(b)});
}catch(e){}}
// Prefer whichever ledger has settled more days (i.e., knows more history).
function pickRR(a,b){if(!a||!a.days)return b;if(!b||!b.days)return a;
  const sa=a.days.filter(d=>d.settled).length,sb=b.days.filter(d=>d.settled).length;
  if(sa!==sb)return sa>sb?a:b;return a.days.length>=b.days.length?a:b;}
// ────────────────────────────────────────────────────────────────────────────
async function getJSON(url){const order=good!=null?[good,...SOURCES.map((_,i)=>i).filter(i=>i!==good)]:SOURCES.map((_,i)=>i);let e;for(const i of order){try{const r=await fetch(SOURCES[i](url),{headers:{Accept:"application/json"}});if(!r.ok)throw 0;const j=await r.json();good=i;return j;}catch(x){e=x;}}throw e||new Error("unreachable");}
async function pool(items,fn,size,onTick){const out=new Array(items.length);let i=0,done=0;const w=async()=>{while(i<items.length){const j=i++;try{out[j]=await fn(items[j]);}catch(e){out[j]=null;}done++;onTick&&onTick(done,items.length);}};await Promise.all(Array.from({length:Math.min(size,items.length||1)},w));return out;}
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const PARK={"Coors Field":110,"Fenway Park":108,"Great American Ball Park":104,"Globe Life Field":103,"Chase Field":103,"Wrigley Field":102,"Yankee Stadium":102,"Citizens Bank Park":102,"Oriole Park at Camden Yards":101,"Rogers Centre":101,"American Family Field":101,"Truist Park":101,"Kauffman Stadium":101,"Daikin Park":100,"Minute Maid Park":100,"Nationals Park":100,"Dodger Stadium":100,"Angel Stadium":100,"Busch Stadium":99,"Target Field":99,"Progressive Field":99,"Rate Field":99,"PNC Park":99,"Comerica Park":99,"Citi Field":98,"Petco Park":97,"loanDepot park":96,"T-Mobile Park":96,"Oracle Park":95,"Sutter Health Park":100,"George M. Steinbrenner Field":101};
function park(n){if(!n)return 100;if(PARK[n]!=null)return PARK[n];const k=Object.keys(PARK).find(k=>n.includes(k)||k.includes(n));return k?PARK[k]:100;}
function status(m,c="var(--blue)"){const e=document.getElementById("status");e.style.color=c;e.innerHTML=m;}
function setProg(p){const w=document.getElementById("progress-wrap"),b=document.getElementById("progress-bar");if(p>0&&p<100){w.style.display="block";b.style.width=p+"%";}else{w.style.display="none";b.style.width="0%";}}
function etNow(){return new Date(new Date().toLocaleString("en-US",{timeZone:"America/New_York"}));}
function ymd(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
// The "baseball day" rolls over at 6 AM ET, so late West-coast games keep
// reporting to the correct slate after midnight Eastern.
function slateYmd(){const d=etNow();d.setHours(d.getHours()-6);return ymd(d);}

async function load(){
  const btn=document.getElementById("run");btn.disabled=true;
  try{
    // Ranking window ends YESTERDAY so today's in-progress games can never
    // reshuffle the list — a rebuild at any hour produces the same rankings.
    const end=etNow();end.setHours(end.getHours()-6); // 6 AM ET slate rollover
    const rEnd=new Date(end);rEnd.setDate(rEnd.getDate()-1);
    const start=new Date(end);start.setDate(start.getDate()-14);
    const endStr=ymd(end),rankEndStr=ymd(rEnd),startStr=ymd(start),season=end.getFullYear();
    status('<span class="spin">⟳</span> Today’s schedule…');setProg(6);
    const sched=await getJSON(`${API}/schedule?sportId=1&date=${endStr}&hydrate=probablePitcher,team,venue`);
    const games=sched?.dates?.[0]?.games||[];
    if(!games.length){status(`No MLB games today (${endStr}).`,"var(--yellow)");renderEmpty();return;}
    // HARD LOCK inside load() itself: past T-60min before first pitch, EVERY
    // path (reload, manual refresh, timers) restores today's saved list rather
    // than rebuilding — the board physically cannot change after the lock.
    const _starts=games.map(g=>Date.parse(g.gameDate)).filter(t=>!isNaN(t));
    const _pastLock=_starts.length?Date.now()>=Math.min(..._starts)-3600000:false;
    if(_pastLock){try{
      let sn=null;try{sn=JSON.parse(localStorage.getItem("parlaiy-snap")||"null");}catch(e){}
      const ok=s=>s&&s.date===endStr&&s.list&&s.list.length;
      const shared=await shareGet(); // other devices' locked list + stake ledger
      if(!ok(sn)&&ok(shared?.snap)){sn=shared.snap;try{localStorage.setItem("parlaiy-snap",JSON.stringify(sn));}catch(e){}}
      _rr=pickRR(shared?.rr,_rr||rrLoad());rrSave();
      if(ok(sn)){current=sn.list;
        await rrSettle(endStr);rrToday(endStr,topPicks(current));
        render(current);sharePush();
        status(`🔒 Locked — today's list (set 1h before first pitch) · live results only`,"var(--yellow)");pollResults();return;}}catch(e){}}
    const byTeam={};
    games.forEach(g=>{if(/postpon|suspend|cancel/i.test(g.status?.detailedState||""))return; // PPD games never seed picks
      const v=g.venue?.name,h=g.teams.home,a=g.teams.away,gk=g.gamePk;
      byTeam[h.team.id]={opp:a.team?.abbreviation||a.team?.name,isHome:true,venue:v,sp:a.probablePitcher?.fullName,spId:a.probablePitcher?.id,gameKey:gk};
      byTeam[a.team.id]={opp:h.team?.abbreviation||h.team?.name,isHome:false,venue:v,sp:h.probablePitcher?.fullName,spId:h.probablePitcher?.id,gameKey:gk};});

    status('<span class="spin">⟳</span> Active rosters…');setProg(14);
    const tids=[...new Set(Object.keys(byTeam))];const active=new Set(),rostered=new Set();
    await pool(tids,async tid=>{try{const d=await getJSON(`${API}/teams/${tid}/roster?rosterType=active`);if(d&&d.roster){rostered.add(String(tid));d.roster.forEach(p=>active.add(p.person.id));}}catch(e){}},6);

    status('<span class="spin">⟳</span> Last-14-day hitting…');setProg(26);
    const hd=await getJSON(`${API}/stats?stats=byDateRange&group=hitting&startDate=${startStr}&endDate=${rankEndStr}&sportId=1&limit=2000&gameType=R&playerPool=All`);
    let all=(hd?.stats?.[0]?.splits||[]).map(s=>({id:s.player?.id,name:s.player?.fullName,teamId:s.team?.id,team:s.team?.name,pos:s.position?.abbreviation,
      avg:parseFloat(s.stat?.avg)||0,hr:+s.stat?.homeRuns||0,rbi:+s.stat?.rbi||0,runs:+s.stat?.runs||0,hits:+s.stat?.hits||0,ab:+s.stat?.atBats||0,g:+s.stat?.gamesPlayed||0}));
    // Only meaningful samples, playing today, not injured
    let pool0=all.filter(p=>p.ab>=25 && p.avg>=0.300 && byTeam[p.teamId] && (!rostered.has(String(p.teamId))||active.has(p.id)));
    if(!pool0.length){status(`No qualifying hot hitters in today’s games.`,"var(--yellow)");renderEmpty();return;}

    // quick composite to shortlist (normalize avg/hr/rbi), then fetch logs for the top ~40
    const nrm=(arr,key)=>{const v=arr.map(x=>x[key]),mn=Math.min(...v),mx=Math.max(...v);return x=>mx>mn?(x[key]-mn)/(mx-mn):0;};
    let na=nrm(pool0,"avg"),nh=nrm(pool0,"hr"),nr=nrm(pool0,"rbi"),nru=nrm(pool0,"runs");
    pool0.forEach(p=>{p.pre=na(p)+nh(p)+nr(p)+nru(p);});
    pool0.sort((a,b)=>b.pre-a.pre);
    let cand=pool0.slice(0,40);

    status('<span class="spin">⟳</span> Counting 3+ H/R/RBI games…');
    const logs=await pool(cand,async p=>{const d=await getJSON(`${API}/people/${p.id}/stats?stats=gameLog&group=hitting&season=${season}&gameType=R`);return (d?.stats?.[0]?.splits||[]).filter(x=>x.stat&&x.date&&x.date>=startStr&&x.date<=rankEndStr);},6,(done,total)=>setProg(30+Math.round(done/total*60)));
    cand.forEach((p,i)=>{let hot=0;(logs[i]||[]).forEach(gm=>{const c=(+gm.stat.hits||0)+(+gm.stat.runs||0)+(+gm.stat.rbi||0);if(c>=RR_LINE)hot++;});p.hotG=hot;p.todayHRR=null;p.cleared=false;p.final=false;});

    // opposing starter hittability (batting-avg-against) for the matchup focus
    cand.forEach(p=>{p.g2=byTeam[p.teamId];p.park=park(p.g2.venue);});
    status('<span class="spin">⟳</span> Pitching matchups…');
    const spIds=[...new Set(cand.map(p=>p.g2.spId).filter(Boolean))];const baaMap={};
    // SP batting-avg-against computed from game logs THROUGH YESTERDAY — a
    // pitcher's season BAA updates live while he pitches, which would make a
    // mid-game rebuild score differently. Falls back to season BAA if logs thin.
    // Also grabs his LAST 3 STARTS' BAA to catch pitchers in hot form.
    await pool(spIds,async pid=>{try{
      const d=await getJSON(`${API}/people/${pid}/stats?stats=gameLog&group=pitching&season=${season}&gameType=R`);
      const gsp=(d?.stats?.[0]?.splits||[]).filter(x=>x.stat&&x.date&&x.date<=rankEndStr);
      let hits=0,ab=0;gsp.forEach(x=>{hits+=(+x.stat.hits||0);ab+=(+x.stat.atBats||0);});
      let rh=0,rab=0;gsp.slice(-3).forEach(x=>{rh+=(+x.stat.hits||0);rab+=(+x.stat.atBats||0);});
      const rec=rab>=15?rh/rab:null;
      if(ab>=30){baaMap[pid]={s:hits/ab,r:rec};return;}
      const d2=await getJSON(`${API}/people/${pid}/stats?stats=season&group=pitching&season=${season}&gameType=R`);
      const st=d2?.stats?.[0]?.splits?.[0]?.stat;if(st&&st.avg!=null)baaMap[pid]={s:parseFloat(st.avg),r:rec};
    }catch(e){}},6);
    cand.forEach(p=>{const bm=(p.g2.spId!=null)?baaMap[p.g2.spId]:null;p.baa=bm?bm.s:null;p.rbaa=bm&&bm.r!=null?bm.r:null;});
    // Preferred pick = genuinely hot (4+ games with 3+ H/R/RBI in the last 14 —
    // the 2.5-line equivalent of the old rule) AND not vs a quality SP (season
    // BAA ≤ .215 or ≤ .200 over his last 3 starts). We TAG rather than drop, so
    // that if fewer than 7 one-per-game preferred picks exist, the next-best
    // eligible hitters backfill to guarantee a full 7-leg round robin.
    cand.forEach(p=>{p.qual = p.hotG>=4 && !(p.baa!=null&&p.baa<=0.215) && !(p.rbaa!=null&&p.rbaa<=0.200);});
    if(!cand.length){status(`No qualifying hot hitters in today’s games.`,"var(--yellow)");renderEmpty();return;}
    // SCORE = 50% hot bat (3+games 35 / AVG 25 / HR 15 / RBI 12.5 / R 12.5) + 50% matchup (SP BAA 70 / park 30)
    na=nrm(cand,"avg");nh=nrm(cand,"hr");nr=nrm(cand,"rbi");nru=nrm(cand,"runs");const ng=nrm(cand,"hotG");
    // Matchup uses a form-weighted BAA: 60% season, 40% last-3-starts, so an
    // SP trending hot drags the matchup down even above the hard filter line.
    cand.forEach(p=>{p.effBaa=p.baa!=null?(p.rbaa!=null?0.6*p.baa+0.4*p.rbaa:p.baa):null;});
    const bArr=cand.map(p=>p.effBaa).filter(v=>v!=null);const bMin=bArr.length?Math.min(...bArr):0.22,bMax=bArr.length?Math.max(...bArr):0.28;
    const pArr=cand.map(p=>p.park);const pkMin=Math.min(...pArr),pkMax=Math.max(...pArr);
    cand.forEach(p=>{const hot=0.35*ng(p)+0.25*na(p)+0.15*nh(p)+0.125*nr(p)+0.125*nru(p);
      const nb=(p.effBaa!=null&&bMax>bMin)?(p.effBaa-bMin)/(bMax-bMin):0.5;
      const npk=pkMax>pkMin?(p.park-pkMin)/(pkMax-pkMin):0.5;const mu=0.7*nb+0.3*npk;
      p.hotN=Math.round(hot*100);p.muN=Math.round(mu*100);p.score=Math.round((0.5*hot+0.5*mu)*100);p.fill=!p.qual;});
    // Preferred picks first (by score), then backfill picks (by score) so the
    // top 7 are filled out even on a thin slate.
    cand.sort((a,b)=>(b.qual-a.qual)||(b.score-a.score));

    setProg(100);setTimeout(()=>setProg(0),300);
    current=cand;
    _rr=pickRR((await shareGet())?.rr,_rr||rrLoad());await rrSettle(endStr);rrToday(endStr,topPicks(cand));
    render(cand,startStr,rankEndStr);
    // Persist today's list so a page reload (iOS refreshes suspended tabs)
    // restores the exact same board instead of rebuilding it mid-slate.
    try{localStorage.setItem("parlaiy-snap",JSON.stringify({date:endStr,list:cand.map(p=>({id:p.id,name:p.name,team:p.team,teamId:p.teamId,pos:p.pos,avg:p.avg,hr:p.hr,rbi:p.rbi,runs:p.runs,hotG:p.hotG,g2:p.g2,park:p.park,baa:p.baa,rbaa:p.rbaa,hotN:p.hotN,muN:p.muN,score:p.score,qual:p.qual,fill:p.fill}))}));}catch(e){}
    sharePush(); // publish the list + stake ledger so every device matches
    status(`✓ ${cand.length} hot hitters in action · 14 days thru ${rankEndStr} · ${new Date().toLocaleTimeString()}`,"var(--green)");
    pollResults();
  }catch(e){status(`✗ ${e.message}. Feed may be blocked — try again.`,"var(--red)");setProg(0);}
  finally{btn.disabled=false;}
}

function renderEmpty(){document.getElementById("parlay").innerHTML="";document.getElementById("tbody").innerHTML=`<tr><td colspan="12"><div class="empty">No games / hot hitters right now.</div></td></tr>`;}

// The round-robin picks: ONE player per game (round robins disallow same-game
// legs), highest score first, capped at RR_N.
function topPicks(list){
  const seenG=new Set();
  return list.filter(p=>{if(p.ppd)return false; // PPD → dropped, next best slides in
    const gk=(p.g2&&p.g2.gameKey!=null)?p.g2.gameKey:("t"+p.teamId);if(seenG.has(gk))return false;seenG.add(gk);return true;}).slice(0,RR_N);
}
function render(list,s,e){
  const top=topPicks(list);
  // Card background = the result: green once the player clears 2.5 H/R/RBI,
  // red when his game goes final without it, neutral while pending/in progress.
  const outcome=p=>p.ppd?"":p.cleared?"win":(p.final?"loss":"");
  const resChip=p=>p.ppd?'<span class="chip pend">☔ PPD</span>'
    :p.cleared?'<span class="chip ok">💣 '+p.todayHRR+'/'+RR_LINE+'</span>'
    :p.final?'<span class="chip lose">💀 '+(p.todayHRR==null?'DNP':p.todayHRR+'/'+RR_LINE)+'</span>'
    :p.todayHRR==null?'<span class="chip pend">⏳</span>':'<span class="chip miss">'+p.todayHRR+'/'+RR_LINE+'</span>';
  document.getElementById("parlay").innerHTML=top.map((p,i)=>`
    <div class="pcard ${outcome(p)}">
      <div class="pc-top"><div class="pc-rank">${i+1}</div><div style="flex:1;min-width:0"><div class="pc-name">${p.name}${p.fill?' <span class="chip" style="background:#FBBF2422;color:var(--yellow);font-size:9px">FILL</span>':''}</div><div class="pc-team">${p.team||""} · ${p.pos||""}</div></div>${resChip(p)}</div>
      <div class="pc-stats">
        <div class="pc-box"><div class="pc-v">${p.avg.toFixed(3).replace(/^0/,"")}</div><div class="pc-l">AVG</div></div>
        <div class="pc-box"><div class="pc-v" style="color:var(--orange)">${p.hr}</div><div class="pc-l">HR</div></div>
        <div class="pc-box"><div class="pc-v" style="color:var(--green)">${p.rbi}</div><div class="pc-l">RBI</div></div>
        <div class="pc-box"><div class="pc-v" style="color:var(--blue)">${p.runs||0}</div><div class="pc-l">R</div></div>
        <div class="pc-box"><div class="pc-v" style="color:var(--purple)">${p.hotG}</div><div class="pc-l">3+ G</div></div>
      </div>
      <div class="pc-mu">${p.g2.isHome?"vs":"@"} <b>${p.g2.opp||"TBD"}</b> · <span class="d">${p.g2.sp||"SP TBD"}${p.baa!=null?" · BAA "+p.baa.toFixed(3).replace(/^0/,""):""}${p.rbaa!=null?" · L3 "+p.rbaa.toFixed(3).replace(/^0/,""):""} · Park ${p.park}</span><div style="margin-top:6px;font-size:11px"><span style="color:var(--orange)">HOT ${p.hotN}</span> · <span style="color:${p.muN>=60?'var(--green)':p.muN>=40?'var(--yellow)':'var(--red)'}">MATCH ${p.muN}</span> · <b style="color:var(--green)">SCORE ${p.score}</b></div></div>
    </div>`).join("")||'<div class="empty">No hot hitters in action.</div>';

  document.getElementById("thead").innerHTML=["#","PLAYER","AVG","HR","RBI","R","3+","OPP / SP","SP BAA","PARK","SCORE","2.5 HRR"].map((h,i)=>`<th class="${[2,3,4,5,6,8,9,10].includes(i)?'num':''}">${h}</th>`).join("");
  document.getElementById("tbody").innerHTML=list.map((p,i)=>`
    <tr class="${outcome(p)}">
      <td class="num" style="color:var(--dim)">${i+1}</td>
      <td><div class="pname">${p.name}${p.fill?' <span class="chip" style="background:#FBBF2422;color:var(--yellow);font-size:9px">FILL</span>':''}</div><div class="pteam">${p.team||""} · ${p.pos||""}</div></td>
      <td class="num">${p.avg.toFixed(3).replace(/^0/,"")}</td>
      <td class="num" style="color:var(--orange)">${p.hr}</td>
      <td class="num" style="color:var(--green)">${p.rbi}</td>
      <td class="num" style="color:var(--blue)">${p.runs||0}</td>
      <td class="num" style="color:var(--purple)">${p.hotG}</td>
      <td style="font-size:12px">${p.g2.isHome?"vs":"@"} ${p.g2.opp||"TBD"}<div style="color:var(--dim);font-size:10px">${p.g2.sp||"SP TBD"}</div></td>
      <td class="num" style="color:${p.baa!=null?(p.baa>=0.260?'var(--green)':p.baa<=0.225?'var(--red)':'var(--yellow)'):'var(--dim)'}">${p.baa!=null?p.baa.toFixed(3).replace(/^0/,""):"—"}</td>
      <td class="num" style="color:${p.park>=103?'var(--green)':p.park<=97?'var(--red)':'var(--yellow)'}">${p.park}</td>
      <td class="num"><b style="color:${p.score>=65?'var(--green)':p.score>=45?'var(--yellow)':'var(--muted)'}">${p.score}</b></td>
      <td>${resChip(p)}</td>
    </tr>`).join("");

  document.getElementById("legend").innerHTML=`<b>SCORE</b> = 50% hot bat (last 14d: 3+ H/R/RBI games 35%, AVG 25%, HR 15%, RBI 12.5%, Runs 12.5%) + 50% matchup (opposing SP batting-avg-against 70%, ballpark 30%). Filters: ≥ .300 and ≥ 25 AB over 14 days · 4+ games with 3+ H/R/RBI in the last 14 · never vs a quality SP (season BAA ≤ .215 or ≤ .200 over his last 3 starts; matchup score uses 60/40 season/recent form) · in today's lineup · injured (IL) excluded. <b style="color:var(--green)">💣 GREEN card</b> = cleared 3+ (Over 2.5) combined H/R/RBI today · <b style="color:var(--red)">💀 RED card</b> = game final without clearing (DNP = didn't play) · <b>⏳</b> = game not started · <b>n/3</b> = live count · <b>☔ PPD</b> = game postponed — dropped from the top 7, next best slides in · <b style="color:var(--yellow)">FILL</b> = backfill pick added to guarantee 7 legs when fewer than 7 clear all filters. Rankings use a 14-day window ending YESTERDAY (today's games never reshuffle the list), lock in 1 hour before the day's first pitch, and survive page reloads — only live results update after the lock. <b>ROUND ROBIN</b> — top 7 picks → 21 doubles at the shown stake; profitable day resets the stake to $1, losing day bumps it 17% (compounding); legs at your book's Over 2.5 price (editable in the banner, default +130 — 4-of-7 is solidly positive there); DNP legs void. ⚠ Watchlist only — not betting advice.`;
  rrBanner();
}
// ~30s live poll straight from each game's BOXSCORE — the aggregate stats feed
// lags until games end, which left covered players stuck on ⏳. Boxscores
// update pitch-by-pitch, so green shows the moment a player clears 2.5 H/R/RBI.
async function pollResults(){
  if(!current.length)return;
  try{
    const endStr=slateYmd();
    const sc=await getJSON(`${API}/schedule?sportId=1&date=${endStr}`);
    const gs=sc?.dates?.[0]?.games||[];
    // A team is "done" only when ALL its games today are truly final —
    // doubleheader game 1 ending must not flag game-2 players, and MLB
    // reports postponed/suspended games as "Final" (those are voids, not
    // losses, so they never count as done here).
    const isFin=g=>g.status?.abstractGameState==="Final"&&!/postpon|suspend|cancel/i.test(g.status?.detailedState||"");
    const isPPD=g=>/postpon|suspend|cancel/i.test(g.status?.detailedState||"");
    const fin={};
    gs.forEach(g=>{if(isPPD(g))return;const f=isFin(g);
      [g.teams?.home?.team?.id,g.teams?.away?.team?.id].forEach(t=>{if(t!=null)fin[t]=(t in fin)?(fin[t]&&f):f;});});
    // A pick whose team has NO remaining non-postponed game today is PPD:
    // dropped from the top 7 (next-best pick slides in), leg never risked.
    const liveTeams=new Set();
    gs.forEach(g=>{if(isPPD(g))return;[g.teams?.home?.team?.id,g.teams?.away?.team?.id].forEach(t=>{if(t!=null)liveTeams.add(t);});});
    current.forEach(p=>{p.ppd=!liveTeams.has(p.teamId);});
    // Pull boxscores for every started game involving a tracked player's TEAM
    // (both ends of a doubleheader), summing a player's H+R+RBI across them.
    const teams=new Set(current.map(p=>p.teamId).filter(v=>v!=null));
    const pks=gs.filter(g=>(teams.has(g.teams?.home?.team?.id)||teams.has(g.teams?.away?.team?.id))&&g.status?.abstractGameState!=="Preview"&&!isPPD(g)).map(g=>g.gamePk);
    const m={};
    await pool(pks,async pk=>{try{
      const b=await getJSON(`${API}/game/${pk}/boxscore`);
      ["home","away"].forEach(side=>{const pl=b?.teams?.[side]?.players||{};
        Object.values(pl).forEach(pp=>{const st=pp?.stats?.batting;
          if(st&&pp.person?.id!=null&&((+st.gamesPlayed||0)>0||(+st.plateAppearances||0)>0||(+st.runs||0)>0))
            m[pp.person.id]=(m[pp.person.id]||0)+(+st.hits||0)+(+st.runs||0)+(+st.rbi||0);});});
    }catch(e){}},5);
    // Backstop: if boxscores came back thin (proxy hiccup / shape change), fill
    // any still-missing players from the aggregate daily feed so a covered
    // player can never sit on pending because one source failed.
    const missing=current.some(p=>m[p.id]==null&&p.g2&&p.g2.gameKey!=null&&pks.includes(p.g2.gameKey));
    if(missing){try{
      const d2=await getJSON(`${API}/stats?stats=byDateRange&group=hitting&startDate=${endStr}&endDate=${endStr}&sportId=1&limit=2000&gameType=R&playerPool=All`);
      (d2?.stats?.[0]?.splits||[]).forEach(x=>{if(x.player?.id!=null&&m[x.player.id]==null)m[x.player.id]=(+x.stat?.hits||0)+(+x.stat?.runs||0)+(+x.stat?.rbi||0);});
    }catch(e){}}
    current.forEach(p=>{if(m[p.id]!=null){p.todayHRR=m[p.id];p.cleared=m[p.id]>=RR_LINE;}p.final=!!fin[p.teamId];});
    // Refresh today's round-robin legs so a PPD substitution flows into the
    // ledger (only while the day is unsettled).
    if(_rr){const t=_rr.days.find(x=>x.date===endStr);if(t&&!t.settled)rrToday(endStr,topPicks(current));}
    render(current);
    const reporting=current.filter(p=>p.todayHRR!=null).length;
    status(`✓ live: ${reporting}/${current.length} players reporting · ${pks.length} games started · updated ${new Date().toLocaleTimeString()}`,"var(--green)");
  }catch(e){}
}
let _lastDate="",_lastProb=-1,_locked=false;
// Rebuild the board when probable starters get posted (matchup score depends on them),
// but FREEZE it once the day's first game starts — no more re-ranking mid-slate.
async function watchStarters(){try{
  const endStr=slateYmd();
  const d=await getJSON(`${API}/schedule?sportId=1&date=${endStr}&hydrate=probablePitcher`);
  const gs=d?.dates?.[0]?.games||[];
  const starts=gs.map(g=>Date.parse(g.gameDate)).filter(t=>!isNaN(t));
  // Freeze the board ONE HOUR before the day's first pitch, not at first pitch.
  const lockAt=starts.length?Math.min(...starts)-3600000:null;
  const pastLock=lockAt!=null&&Date.now()>=lockAt;
  if(endStr!==_lastDate){_lastDate=endStr;_lastProb=-1;_locked=false;} // new day → unlock & rebuild
  if(_locked)return;                                                    // board frozen for the day
  if(pastLock){                                                        // past T-60min → load() itself
    if(!current.length)await load();                                   // restores (shared/local) or builds once
    _locked=true;
    if(current.length)status(`🔒 Board locked (1h before first pitch) — live results only · ${new Date().toLocaleTimeString()}`,"var(--yellow)");
    return;}
  let prob=0;gs.forEach(g=>{if(g.teams?.home?.probablePitcher)prob++;if(g.teams?.away?.probablePitcher)prob++;});
  if(prob>_lastProb){_lastProb=prob;await load();}                      // starters posted → rebuild (pre-lock only)
}catch(e){}}
watchStarters();                    // initial build + rebuild as starters post
setInterval(watchStarters,900000);  // check for newly-posted starters every 15 min
setInterval(pollResults,30000);     // live 2.5 H/R/RBI results every ~30s
</script>
