name: ParlAIy Telegram Alerts

on:
  schedule:
    # Every 5 minutes across MLB game hours (UTC). Covers ~10 AM–3 AM ET.
    - cron: "*/5 14-23 * * *"
    - cron: "*/5 0-7 * * *"
  workflow_dispatch:

permissions: {}

concurrency:
  group: parlaiy-alerts
  cancel-in-progress: false

jobs:
  alerts:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Restore the alert memory (state.json) saved by the previous run so we
      # never re-send the lock alert or a leg result twice. restore-keys picks
      # the most recent state cached under the prefix.
      - name: Restore alert state
        uses: actions/cache/restore@v4
        with:
          path: state.json
          key: parlaiy-state-${{ github.run_id }}
          restore-keys: |
            parlaiy-state-

      - name: Run alerts check
        run: node scripts/parlaiy-alerts.mjs
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      # Save the updated memory under a unique key so the write always succeeds.
      - name: Save alert state
        if: always()
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: state.json
          key: parlaiy-state-${{ github.run_id }}-${{ github.run_attempt }}
