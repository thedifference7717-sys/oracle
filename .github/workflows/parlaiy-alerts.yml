name: ParlAIy Telegram Alerts

on:
  schedule:
    # GitHub throttles */5 scheduled runs to ~hourly during peak hours, so we do
    # NOT rely on cron for cadence. Each launched job self-loops for ~57 min
    # checking every 60s; cron just needs to (re)start a job now and then.
    - cron: "*/15 14-23 * * *"
    - cron: "*/15 0-7 * * *"
  workflow_dispatch:

permissions: {}

concurrency:
  group: parlaiy-alerts
  cancel-in-progress: false

jobs:
  alerts:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Restore the alert memory (state.json) so we never re-send the lock alert
      # or a leg result twice, even across separate jobs.
      - name: Restore alert state
        uses: actions/cache/restore@v4
        with:
          path: state.json
          key: parlaiy-state-${{ github.run_id }}
          restore-keys: |
            parlaiy-state-

      # Self-loop for ~57 minutes, checking every 60s. This gives ~1-minute alert
      # latency regardless of how badly GitHub throttles the schedule. state.json
      # persists dedupe across every iteration within the job.
      - name: Run alerts loop
        run: |
          END=$(( $(date +%s) + 57*60 ))
          while :; do
            node scripts/parlaiy-alerts.mjs || true
            [ "$(date +%s)" -ge "$END" ] && break
            sleep 60
          done
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      # Persist the updated memory for the next job.
      - name: Save alert state
        if: always()
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: state.json
          key: parlaiy-state-${{ github.run_id }}-${{ github.run_attempt }}
